services:
  api:
    build:
      context: ../..
      dockerfile: standalone/docker/api.Dockerfile
    env_file: [../../.env]
    ports:
      - "${API_PORT:-8000}:8000"

  ui:
    build:
      context: ../..
      dockerfile: standalone/docker/ui.Dockerfile
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on: [api]

